// ÉTAT
// ═══════════════════════════════════════════════════════════
let puzzle      = null;
let states      = Array(9).fill(null);   // null | 'valid' | 'invalid'
let selectedIdx = -1;                    // case actuellement sélectionnée
let hintStates    = Array.from({length:9}, () => new Set()); // norms d'animaux déjà montrés par case
let hintedCountry = Array(9).fill(null); // pays actuellement affiché comme indice par case
let lastActiveIdx = -1;
let hintCount     = 0;              // total hints (legacy, pour compatibilité)
let solveCount    = 0;              // total solver (legacy)
let hintPenalties  = Array(9).fill(0); // pénalité hint accumulée par case
let resetPenalties = Array(9).fill(0); // pénalité retrait d'une case validée
let wrongPenalties = Array(9).fill(0); // pénalité réponse invalide
let solvedByBot    = Array(9).fill(false); // cases résolues par le solver

// ═══════════════════════════════════════════════════════════
// SÉLECTION DE CASE
// ═══════════════════════════════════════════════════════════
function selectCell(idx) {
  if (selectedIdx === idx) return;
  // Retirer la surbrillance de l'ancienne case
  if (selectedIdx >= 0) {
    document.querySelector(`.cell[data-idx="${selectedIdx}"]`)?.classList.remove('selected');
  }
  selectedIdx = idx;
  document.querySelector(`.cell[data-idx="${idx}"]`)?.classList.add('selected');
  updateHintBtn();
}

function updateHintBtn() {
  const solve = document.getElementById('btn-solve-cell');
  if (solve) solve.disabled = selectedIdx < 0 || states[selectedIdx] === 'valid';
}

// ═══════════════════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════════════════
function newGame() {
  // expert2 nécessite 8 groupes distincts : parfois aucune combinaison trouvée en un seul appel.
  // On retente jusqu'à 6× pour absorber les échecs statistiques sans bloquer l'UI.
  let p = null;
  const maxRetries = difficulty === 'expert2' ? 6 : 3;
  for (let i = 0; i < maxRetries && !p; i++) p = generatePuzzle(difficulty);
  puzzle = p;

  const noEl = document.getElementById('no-puzzle');
  if (!puzzle) {
    if (noEl) noEl.textContent = '⚠️ Impossible de générer une grille pour ce niveau, réessayez.';
    return;
  }
  if (noEl) noEl.textContent = '';
  _currentGameCounted = false;
  states      = Array(9).fill(null);
  hintStates    = Array.from({length:9}, () => new Set());
  hintedCountry = Array(9).fill(null);
  selectedIdx = -1;
  hintCount     = 0;
  solveCount    = 0;
  hintPenalties  = Array(9).fill(0);
  resetPenalties = Array(9).fill(0);
  wrongPenalties = Array(9).fill(0);
  solvedByBot    = Array(9).fill(false);
  closeAnswersPopup();
  renderGrid();
  updateHintBtn();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // En mode Expert+ : classe CSS qui gère 4 ou 5 colonnes (responsive)
  grid.classList.toggle('grid-expert2', !!puzzle.diagRule2);

  // Coin haut-gauche : règle diagonale ↘ ou badge Diabolique
  if (puzzle.diagRule) {
    const corner = document.createElement('div');
    corner.className = 'diag-rule';
    corner.innerHTML = `<span>↘</span><em>${puzzle.diagRule.label}</em>`;
    grid.appendChild(corner);
  } else if (difficulty === 'diabolique' && puzzle.isUnique) {
    const corner = document.createElement('div');
    corner.className = 'diag-rule';
    corner.style.cssText = 'background:rgba(220,38,38,0.15);border-color:rgba(220,38,38,0.4);color:#fca5a5;font-size:0.72em';
    corner.innerHTML = `<span style="font-size:1.4em">😈</span><em>Solution<br>unique</em>`;
    grid.appendChild(corner);
  } else {
    grid.appendChild(Object.assign(document.createElement('div'), { className:'corner' }));
  }

  // En-têtes colonnes
  puzzle.colRules.forEach(r => {
    const d = document.createElement('div');
    d.className = 'col-rule';
    d.textContent = r.label;
    grid.appendChild(d);
  });

  // Coin haut-droit : règle diagonale ↙ (Expert+ uniquement)
  if (puzzle.diagRule2) {
    const corner2 = document.createElement('div');
    corner2.className = 'diag-rule';
    corner2.style.cssText = 'background:rgba(233,30,99,0.12);border-color:rgba(233,30,99,0.4);color:#f48fb1';
    corner2.innerHTML = `<span>↙</span><em>${puzzle.diagRule2.label}</em>`;
    grid.appendChild(corner2);
  }

  // Lignes
  for (let row = 0; row < 3; row++) {
    const rh = document.createElement('div');
    rh.className = 'row-rule';
    rh.textContent = puzzle.rowRules[row].label;
    grid.appendChild(rh);

    for (let col = 0; col < 3; col++) {
      const idx = row*3+col;
      const cell = document.createElement('div');
      const isDiag  = puzzle.diagRule  && (idx===0||idx===4||idx===8);
      const isDiag2 = puzzle.diagRule2 && (idx===2||idx===4||idx===6);
      cell.className = 'cell' + (isDiag ? ' cell-diag' : '') + (isDiag2 ? ' cell-diag2' : '');
      cell.dataset.idx = idx;
      // Sélection de la case au clic sur son fond
      cell.addEventListener('click', e => {
        if (e.target !== inp) selectCell(idx);
      });

      const n = puzzle.counts[idx];
      const countEl = document.createElement('div');
      countEl.className = 'cell-count ' + (n >= 10 ? 'cc-easy' : n >= 4 ? 'cc-medium' : 'cc-hard');
      countEl.textContent = n + ' réponse' + (n > 1 ? 's' : '');
      countEl.addEventListener('click', e => {
        e.stopPropagation();
        if (states[idx] === 'valid' && states.every(s => s === 'valid')) showAnswersPopup(idx, countEl);
      });

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = 'Pays...';
      inp.autocomplete = 'off';
      inp.spellcheck = false;
      inp.addEventListener('focus', () => {
        lastActiveIdx = idx;
        selectCell(idx);
      });
      inp.addEventListener('input', () => {
        hintStates[idx].clear();
        hintedCountry[idx] = null;
        if (!inp.value.trim()) { clearCell(idx); acHide(); }
        else acShow(idx, inp.value);
      });
      inp.addEventListener('keydown', e => {
        const drop = document.getElementById('ac-drop');
        if (drop.style.display === 'block') {
          if (e.key === 'ArrowDown') { e.preventDefault(); acMove(1); return; }
          if (e.key === 'ArrowUp')   { e.preventDefault(); acMove(-1); return; }
          if (e.key === 'Escape')    { acHide(); return; }
          if (e.key === 'Enter') {
            const sel = drop.querySelector('.ac-sel');
            if (sel) { e.preventDefault(); acPick(sel.dataset.nom); return; }
          }
        }
        if (e.key === 'Enter') { acHide(); validateCell(idx); }
      });
      inp.addEventListener('blur', () => {
        setTimeout(() => {
          acHide();
          if (inp.value.trim()) validateCell(idx);
        }, 160);
      });

      const imgWrap = document.createElement('div');
      imgWrap.className = 'cell-img-wrap';
      imgWrap.id = 'cellimg'+idx;
      imgWrap.appendChild(document.createElement('img'));

      const hintBtn = document.createElement('button');
      hintBtn.className = 'btn-cell-hint';
      hintBtn.textContent = '💡 Indice';
      hintBtn.addEventListener('click', e => { e.stopPropagation(); giveHint(idx); });

      const msg = document.createElement('div');
      msg.className = 'cell-msg';
      msg.id = 'msg'+idx;

      const resetBtn = document.createElement('button');
      resetBtn.className = 'btn-reset-cell';
      resetBtn.textContent = '✕';
      resetBtn.title = 'Modifier la réponse';
      resetBtn.addEventListener('click', e => {
        e.stopPropagation();
        states[idx] = null;
        setCellState(idx, null, '');
        hideCellImage(idx);
        hintStates[idx].clear();
        hintedCountry[idx] = null;
        updateScore();
        updateHintBtn();
        selectCell(idx);
        inp.focus();
      });

      const cellFooter = document.createElement('div');
      cellFooter.className = 'cell-footer';
      cellFooter.append(msg, resetBtn);

      cell.append(countEl, inp, imgWrap, hintBtn, cellFooter);
      grid.appendChild(cell);
    }

    // Colonne vide à droite en mode Expert+
    if (puzzle.diagRule2) {
      grid.appendChild(document.createElement('div'));
    }
  }

  updateScore();
}

function getInput(idx) {
  const cell = document.querySelector(`.cell[data-idx="${idx}"]`);
  return cell ? cell.querySelector('input') : null;
}

function clearCell(idx) {
  states[idx] = null;
  setCellState(idx, null, '');
  hideCellImage(idx);
  updateScore();
}

function showCellImage(idx, code) {
  const wrap = document.getElementById('cellimg'+idx);
  const inp  = getInput(idx);
  if (!wrap || !inp) return;
  inp.style.display = 'none';
  wrap.style.display = 'flex';
  const img = wrap.querySelector('img');
  img.src = `https://flagcdn.com/w160/${code.toLowerCase()}.png`;
  img.alt = code;
  img.style.objectFit = 'contain';
}

function hideCellImage(idx) {
  const wrap = document.getElementById('cellimg'+idx);
  const inp  = getInput(idx);
  if (wrap) wrap.style.display = 'none';
  if (inp)  inp.style.display  = '';
}

function validateCell(idx) {
  const inp = getInput(idx);
  if (!inp || !inp.value.trim()) return;
  // Compter la partie dès le premier vrai essai
  if (!_currentGameCounted) {
    _currentGameCounted = true;
    incStat('started', difficulty);
    renderStats(); renderPersonalBest();
    sbIncrementGlobal().then(renderGlobalCount);
  }
  const q = normInput(inp.value);
  const country = COUNTRY_INDEX.get(q) || COUNTRIES.find(p => p._norm === q);
  const row = Math.floor(idx/3), col = idx%3;
  const rr = puzzle.rowRules[row], cr = puzzle.colRules[col];

  if (!country) {
    states[idx] = 'invalid';
    setCellState(idx, 'invalid', `"${inp.value}" non trouvé dans la base`);
  } else {
    const normVal = normInput(inp.value);
    const isDuplicate = Array.from({length:9}, (_,i) => i)
      .filter(i => i !== idx && states[i] === 'valid')
      .some(i => normInput(getInput(i)?.value || '') === normVal);
    if (isDuplicate) {
      states[idx] = 'invalid';
      setCellState(idx, 'invalid', `${country.nom} est déjà utilisé dans une autre case`);
    } else if (!rr.fn(country)) {
      states[idx] = 'invalid';
      wrongPenalties[idx] += Math.ceil(cellBasePoints(idx) / 4);
      setCellState(idx, 'invalid', `Règle ligne non respectée — −${Math.ceil(cellBasePoints(idx)/4)} pt`);
    } else if (!cr.fn(country)) {
      states[idx] = 'invalid';
      wrongPenalties[idx] += Math.ceil(cellBasePoints(idx) / 4);
      setCellState(idx, 'invalid', `Règle colonne non respectée — −${Math.ceil(cellBasePoints(idx)/4)} pt`);
    } else if (getDiagRule(idx) && !getDiagRule(idx).fn(country)) {
      states[idx] = 'invalid';
      wrongPenalties[idx] += Math.ceil(cellBasePoints(idx) / 4);
      setCellState(idx, 'invalid', `Diagonale ↘ non respectée — −${Math.ceil(cellBasePoints(idx)/4)} pt`);
    } else if (getDiagRule2(idx) && !getDiagRule2(idx).fn(country)) {
      states[idx] = 'invalid';
      wrongPenalties[idx] += Math.ceil(cellBasePoints(idx) / 4);
      setCellState(idx, 'invalid', `Diagonale ↙ non respectée — −${Math.ceil(cellBasePoints(idx)/4)} pt`);
    } else {
      states[idx] = 'valid';
      setCellState(idx, 'valid', `✓ ${country.nom}${rarityStars(country)}`);
      showCellImage(idx, country.code);
    }
  }
  if (states[idx] !== 'valid') hideCellImage(idx);
  hintStates[idx].clear();
  hintedCountry[idx] = null;
  updateScore();
  updateHintBtn();
  checkVictory();
}


function setCellState(idx, state, msg) {
  const cell = document.querySelector(`.cell[data-idx="${idx}"]`);
  if (!cell) return;
  const sel  = selectedIdx === idx ? ' selected' : '';
  const diag  = getDiagRule(idx)  ? ' cell-diag'  : '';
  const diag2 = getDiagRule2(idx) ? ' cell-diag2' : '';
  cell.className = 'cell' + diag + diag2 + sel + (state ? ' '+state : '');
  document.getElementById('msg'+idx).textContent = msg;
}

// ── Helpers scoring ────────────────────────────────────────
const DIFF_MULT = {
  facile: 0.7, moyen: 1.0, difficile: 1.4,
  avance: 1.8, expert2: 2.3, diabolique: 3.0,
};

function cellBasePoints(idx) {
  const n = puzzle ? puzzle.counts[idx] : 9;
  const base = Math.max(1, Math.round(7 / Math.sqrt(n)));
  return Math.max(1, Math.round(base * (DIFF_MULT[difficulty] || 1.0)));
}

// ── Notoriété composite : population + bonus thématique ─────
const FAME_BONUS = {
  // G7 + membres permanents CSNU
  'US':38,'GB':35,'FR':35,'DE':35,'CN':35,'RU':32,'JP':35,'IT':30,'CA':30,
  // G20 hors G7
  'IN':30,'BR':28,'AU':28,'KR':26,'MX':25,'ID':22,'SA':22,'TR':25,'AR':20,'ZA':20,
  // Europe reconnue (tourisme, diplomatie, culture)
  'ES':25,'NL':22,'BE':20,'SE':22,'PL':18,'NO':20,'CH':26,'AT':18,'DK':18,
  'FI':16,'PT':18,'GR':22,'IE':18,'CZ':15,'HU':14,'UA':28,'IS':18,'LU':18,
  'RO':14,'BG':12,'HR':12,'SK':12,'SI':10,'RS':12,'BA':10,'AL':10,'MK':8,
  'LT':10,'LV':10,'EE':10,'BY':14,'MD':8,'GE':12,'AM':10,'AZ':12,
  // Moyen-Orient / actualité internationale
  'IL':28,'IR':22,'AE':26,'QA':20,'KW':14,'IQ':18,'SY':15,'LB':15,
  'JO':12,'YE':12,'OM':10,'BH':12,'AF':16,'PK':18,
  // Asie / Pacifique
  'SG':30,'TH':22,'VN':16,'MY':16,'PH':14,'BD':18,'MM':10,'KH':10,
  'LA':8,'MN':8,'KP':22,'LK':10,'NP':10,'BT':5,'NZ':22,'KZ':12,
  'UZ':8,'TM':6,'TJ':6,'KG':6,
  // Afrique
  'NG':20,'EG':22,'ET':15,'KE':15,'TZ':12,'GH':12,'MA':20,'DZ':15,
  'TN':14,'LY':12,'CM':10,'CD':12,'AO':10,'SN':10,'ZW':10,'ZM':8,
  'MZ':8,'SD':10,'SO':10,'RW':10,'CI':10,'UG':10,'MG':8,
  // Amériques
  'CL':16,'CO':16,'PE':14,'VE':12,'EC':10,'BO':10,'UY':12,'PY':6,
  'GY':6,'SR':5,'HT':12,'CU':16,'DO':10,'JM':12,'GT':10,'HN':8,
  'NI':8,'CR':12,'PA':14,'BZ':6,'BB':8,'TT':8,
  // Petits États très médiatisés
  'VA':18,'MC':15,'SM':12,'AD':10,'MT':12,'LI':8,'MV':8,
};

function fameScore(country) {
  const popBase = {'<1M':5,'1M-10M':16,'10M-50M':26,'50M-200M':38,'>200M':50};
  let score = popBase[country.population_groupe] || 16;
  if (country.ue) score += 8;
  const bigLangs = ['Anglais','Espagnol','Français','Arabe','Portugais','Allemand','Mandarin','Russe'];
  if (bigLangs.some(l => country.langue.includes(l))) score += 5;
  score += FAME_BONUS[country.code] || 0;
  return score;
}

function rarityMult(country) {
  if (!country) return 1.0;
  const fame = fameScore(country);
  // fame ~5–95 → multiplicateur 1.0 (très connu) à ~3.9 (très obscur)
  const raw = 4.0 - 3.0 * Math.min(1, fame / 80);
  return Math.max(1.0, Math.round(raw * 10) / 10);
}

function rarityStars(country) {
  const m = rarityMult(country);
  if (m >= 3.0) return ' ★★★';
  if (m >= 2.0) return ' ★★';
  if (m >= 1.5) return ' ★';
  return '';
}

function computeScore() {
  let total = 0;
  let totalHintPenalty = 0;
  let botCells = 0;
  const cellScores = [];

  for (let idx = 0; idx < 9; idx++) {
    if (states[idx] !== 'valid') { cellScores.push(null); continue; }

    const base = cellBasePoints(idx);

    if (solvedByBot[idx]) {
      botCells++;
      cellScores.push({ pts: 0, gross: 0, penalty: 0, bot: true });
      continue;
    }

    const inp = getInput(idx);
    const q = normInput(inp?.value || '');
    const country = COUNTRY_INDEX.get(q);
    const rm      = rarityMult(country);
    const gross   = Math.round(base * rm);
    const pen     = hintPenalties[idx] + wrongPenalties[idx];
    const pts     = gross - pen; // peut être négatif si trop d'erreurs
    total += pts;
    totalHintPenalty += hintPenalties[idx];
    cellScores.push({ pts, gross, penalty: pen, hintPen: hintPenalties[idx], wrongPen: wrongPenalties[idx], bot: false, rm });
  }

  // Pénalités des cases pas encore validées (mauvaises réponses en cours)
  for (let idx = 0; idx < 9; idx++) {
    if (states[idx] !== 'valid') total -= wrongPenalties[idx] + hintPenalties[idx];
  }

  // Bonus lignes / colonnes / grille complète (cases résolues par le joueur uniquement)
  const mult = DIFF_MULT[difficulty] || 1.0;
  const bonusPer = Math.max(1, Math.round(4 * mult));
  let rowBonus = 0, colBonus = 0, gridBonus = 0;
  for (let r = 0; r < 3; r++) {
    const c3 = [r*3, r*3+1, r*3+2];
    if (c3.every(i => states[i] === 'valid' && !solvedByBot[i])) rowBonus += bonusPer;
  }
  for (let c = 0; c < 3; c++) {
    const c3 = [c, c+3, c+6];
    if (c3.every(i => states[i] === 'valid' && !solvedByBot[i])) colBonus += bonusPer;
  }
  if (states.every(s => s === 'valid') && solvedByBot.every(b => !b))
    gridBonus = Math.max(1, Math.round(12 * mult));
  total += rowBonus + colBonus + gridBonus;

  const totalWrongPenalty = wrongPenalties.reduce((a,b) => a+b, 0);
  return { total, totalHintPenalty, totalWrongPenalty, botCells, cellScores, rowBonus, colBonus, gridBonus };
}

function updateScore() {
  const n = states.filter(s => s === 'valid').length;
  document.getElementById('score').textContent = `${n} / 9 cases validées`;
  if (!puzzle) return;
  const { total } = computeScore();
  const ps = document.getElementById('potential-score');
  if (ps) ps.innerHTML = `Score : <span>${total} pts</span>`;
}

function getUnusedCands(idx) {
  const row = Math.floor(idx/3), col = idx%3;
  const usedNorms = new Set(
    Array.from({length:9}, (_,i) => i)
      .filter(i => i !== idx && states[i] === 'valid')
      .map(i => normInput(getInput(i)?.value || ''))
      .filter(Boolean)
  );
  return cellCandidates(puzzle.rowRules[row], puzzle.colRules[col], getDiagRule(idx), getDiagRule2(idx))
    .filter(p => !usedNorms.has(p._norm));
}

function solveCell() {
  if (selectedIdx < 0 || states[selectedIdx] === 'valid') return;
  const cands = getUnusedCands(selectedIdx);
  if (!cands.length) return;
  const hinted = hintedCountry[selectedIdx];
  const pick = (hinted && cands.find(c => c._norm === hinted._norm)) || cands[Math.floor(Math.random() * cands.length)];
  const inp = getInput(selectedIdx);
  if (!inp) return;
  inp.value = pick.nom;
  solveCount++;
  solvedByBot[selectedIdx] = true;
  validateCell(selectedIdx);
}

function solveAll() {
  for (let pass = 0; pass < 9; pass++) {
    const remaining = Array.from({length:9}, (_,i) => i).filter(i => states[i] !== 'valid');
    if (!remaining.length) break;
    // Choisir la case avec le moins de candidats disponibles
    let bestIdx = -1, bestCands = null, bestCount = Infinity;
    for (const idx of remaining) {
      const cands = getUnusedCands(idx);
      if (cands.length < bestCount) { bestCount = cands.length; bestIdx = idx; bestCands = cands; }
    }
    if (bestIdx < 0 || !bestCands.length) break;
    const hinted = hintedCountry[bestIdx];
    const pick = (hinted && bestCands.find(c => c._norm === hinted._norm)) || bestCands[Math.floor(Math.random() * bestCands.length)];
    const inp = getInput(bestIdx);
    if (!inp) continue;
    inp.value = pick.nom;
    solveCount++;
    solvedByBot[bestIdx] = true;
    validateCell(bestIdx);
  }
}

function checkVictory() {
  if (!states.every(s => s === 'valid')) return;
  const { total, totalHintPenalty, totalWrongPenalty, botCells, cellScores, rowBonus, colBonus, gridBonus } = computeScore();

  const diffLabel = { facile:'Facile', moyen:'Moyen', difficile:'Difficile', avance:'Expert', expert2:'Globe-Trotter', diabolique:'Diabolique' };
  const mult = DIFF_MULT[difficulty] || 1.0;

  const rareCells = cellScores.filter(c => c && !c.bot && c.rm >= 1.5);
  const rareRows = rareCells.map(c => {
    const stars = c.rm >= 3 ? '★★★' : c.rm >= 2 ? '★★' : '★';
    return `<div class="score-row"><span>${stars} Pays rare (×${c.rm.toFixed(1)})</span><span>+${c.gross} pts</span></div>`;
  }).join('');

  const vs = document.getElementById('victory-score');
  vs.innerHTML = `
    <div class="score-total" style="${total <= 0 ? 'color:#fca5a5' : ''}">${total <= 0 ? '😬' : '🏆'} ${total} pts${total <= 0 ? ' — trop d\'erreurs !' : ''}</div>
    <div class="score-breakdown">
      <div class="score-row" style="color:#888;font-size:0.85em"><span>Multiplicateur ${diffLabel[difficulty] || difficulty} (×${mult.toFixed(1)})</span><span></span></div>
      ${rareRows}
      ${rowBonus  ? `<div class="score-row" style="color:#86efac"><span>Bonus lignes complètes</span><span>+${rowBonus} pts</span></div>` : ''}
      ${colBonus  ? `<div class="score-row" style="color:#86efac"><span>Bonus colonnes complètes</span><span>+${colBonus} pts</span></div>` : ''}
      ${gridBonus ? `<div class="score-row" style="color:#fde68a"><span>🏆 Bonus grille entière</span><span>+${gridBonus} pts</span></div>` : ''}
      ${totalWrongPenalty ? `<div class="score-row neg"><span>Réponses invalides</span><span>−${totalWrongPenalty} pts</span></div>` : ''}
      ${totalHintPenalty  ? `<div class="score-row neg"><span>Indices utilisés</span><span>−${totalHintPenalty} pts</span></div>` : ''}
      ${botCells ? `<div class="score-row neg"><span>${botCells} case(s) résolue(s) par solver</span><span>0 pt</span></div>` : ''}
    </div>`;
  incStat('completed', difficulty);
  renderStats();
  const isRecord = saveBest(difficulty, total);
  renderPersonalBest();
  if (isRecord)
    vs.insertAdjacentHTML('afterbegin', `<div class="new-record-badge">🏆 Nouveau record !</div>`);
  const shareBtn = document.getElementById('btn-share-grid');
  if (shareBtn) shareBtn.style.display = total >= 1 ? '' : 'none';
  document.getElementById('victory').classList.add('show');
  // Vérifier async si le score entre dans le top 5 mondial
  if (total > 0) Promise.all([sbIsTop5(difficulty, total), sbIsTop5Global(total)])
    .then(([inDiff, inGlobal]) => { if (inDiff || inGlobal) showPseudoForm(total, difficulty, inGlobal); });
}

// ─── Indice textuel (cycle sur les animaux valides) ────────
function giveHint(idx) {
  if (states[idx] === 'valid') return;
  const row = Math.floor(idx/3), col = idx%3;
  const shown = hintStates[idx];

  const usedNorms = new Set(
    Array.from({length:9}, (_,i) => i)
      .filter(i => i !== idx && states[i] === 'valid')
      .map(i => normInput(getInput(i)?.value || ''))
      .filter(Boolean)
  );
  const cands = cellCandidates(puzzle.rowRules[row], puzzle.colRules[col], getDiagRule(idx), getDiagRule2(idx))
    .filter(p => !usedNorms.has(p._norm) && p.indice);

  if (!cands.length) {
    document.getElementById('msg'+idx).textContent = 'Aucun indice disponible';
    return;
  }

  let pool = cands.filter(p => !shown.has(p._norm));
  if (!pool.length) {
    shown.clear();
    pool = cands;
  }

  const pick = pool[Math.floor(Math.random() * pool.length)];
  shown.add(pick._norm);
  hintedCountry[idx] = pick;

  hintCount++;
  hintPenalties[idx] += Math.ceil(cellBasePoints(idx) / 2);
  updateScore();
  document.getElementById('msg'+idx).textContent = `\u{1F4A1} ${pick.indice}`;
}

function hlNom(nom, q) {
  if (!q) return escHtml(nom);
  // Chercher q dans le nom normalisé sans accents (mais avec tirets)
  const base = nom.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();
  const pos = base.indexOf(q);
  if (pos < 0) return '<em>' + escHtml(nom) + '</em>';
  return escHtml(nom.slice(0, pos)) + '<em>' + escHtml(nom.slice(pos, pos + q.length)) + '</em>' + escHtml(nom.slice(pos + q.length));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Tooltip drapeau ───────────────────────────────────────
function showFlagTooltip(nom, code, anchorEl) {
  const tip = document.getElementById('wiki-tooltip');
  tip.innerHTML = `<img src="https://flagcdn.com/w160/${code.toLowerCase()}.png" alt="${escHtml(nom)}" style="object-fit:contain"><div class="wt-name">${escHtml(nom)}</div>`;
  placeWikiTooltip(tip, anchorEl);
  tip.style.display = 'block';
}

function placeWikiTooltip(tip, anchorEl) {
  const r = anchorEl.getBoundingClientRect();
  const tw = 162;
  let left = r.right + 8;
  if (left + tw > window.innerWidth - 8) left = r.left - tw - 8;
  let top = r.top - 10;
  if (top + 220 > window.innerHeight - 8) top = window.innerHeight - 228;
  if (top < 8) top = 8;
  tip.style.left = left + 'px';
  tip.style.top  = top + 'px';
}

function hideWikiTooltip() {
  document.getElementById('wiki-tooltip').style.display = 'none';
}

function acShow(cellIdx, rawVal) {
  const q = normInput(rawVal);
  if (q.length < 3) { acHide(); return; }
  // Pays déjà valides (pour les marquer)
  const usedNorms = new Set(
    Array.from({length:9}, (_,i) => i)
      .filter(i => i !== cellIdx && states[i] === 'valid')
      .map(i => normInput(getInput(i)?.value || ''))
  );
  // Correspondances : commence par q en premier, puis contient q
  const startsWith = [], contains = [];
  for (const p of COUNTRIES) {
    if (usedNorms.has(p._norm)) continue;
    if (p._norm.startsWith(q)) startsWith.push(p);
    else if (p._norm.includes(q)) contains.push(p);
  }
  const matches = [...startsWith, ...contains].slice(0, 10);
  if (!matches.length) { acHide(); return; }

  const drop = document.getElementById('ac-drop');
  drop.innerHTML = '';
  acCellIdx = cellIdx;
  acSelIdx  = -1;

  matches.forEach(p => {
    const item = document.createElement('div');
    item.className = 'ac-item';
    item.dataset.nom = p.nom;

    const nameSpan = document.createElement('span');
    nameSpan.innerHTML = hlNom(p.nom, q);
    item.appendChild(nameSpan);

    const flagBtn = document.createElement('button');
    flagBtn.className = 'ac-wiki';
    flagBtn.textContent = '🏳';
    flagBtn.title = 'Voir le drapeau';
    flagBtn.addEventListener('mouseenter', () => showFlagTooltip(p.nom, p.code, flagBtn));
    flagBtn.addEventListener('mouseleave', hideWikiTooltip);
    flagBtn.addEventListener('mousedown', e => e.preventDefault());
    item.appendChild(flagBtn);

    item.addEventListener('mousedown', e => { if (e.target !== flagBtn) { e.preventDefault(); acPick(p.nom); } });
    drop.appendChild(item);
  });

  const inp = getInput(cellIdx);
  if (!inp) return;
  const rect = inp.getBoundingClientRect();
  drop.style.left  = rect.left + 'px';
  drop.style.top   = (rect.bottom + 3) + 'px';
  drop.style.width = Math.max(rect.width, 200) + 'px';
  drop.style.display = 'block';
}

function acHide() {
  document.getElementById('ac-drop').style.display = 'none';
  hideWikiTooltip();
  acSelIdx = -1;
}

function acMove(dir) {
  const items = document.getElementById('ac-drop').querySelectorAll('.ac-item');
  if (!items.length) return;
  if (acSelIdx >= 0) items[acSelIdx].classList.remove('ac-sel');
  acSelIdx = (acSelIdx + dir + items.length) % items.length;
  items[acSelIdx].classList.add('ac-sel');
  items[acSelIdx].scrollIntoView({ block:'nearest' });
}

function acPick(nom) {
  acHide();
  if (acCellIdx < 0) return;
  const inp = getInput(acCellIdx);
  if (inp) {
    inp.value = nom;
    validateCell(acCellIdx);
    inp.focus();
  }
}

function maxScoreEstimate(diff) {
  const mult = DIFF_MULT[diff] || 1.0;
  const minN = { facile:15, moyen:8, difficile:4, avance:3, expert2:2, diabolique:1 }[diff] || 5;
  const base  = Math.max(1, Math.round(7 / Math.sqrt(minN)));
  const baseM = Math.max(1, Math.round(base * mult));
  const maxCell  = Math.round(baseM * 3.9);
  const bonusPer = Math.max(1, Math.round(4 * mult));
  const gridB    = Math.max(1, Math.round(12 * mult));
  return 9 * maxCell + 3 * bonusPer + 3 * bonusPer + gridB;
}

function puzzleToGridData(p) {

    diag:   p.diagRule  ? p.diagRule.label  : null,
    diag2:  p.diagRule2 ? p.diagRule2.label : null,

  });

const BAD_WORDS = ['nazi','hitler','hitler','bite','bites','couille','couilles',
  'putain','connard','connards','salope','salopes','pute','putes','enculé','encule',
  'fdp','ntm','pedophile','pedo','violeur','niquer','nique','baiser','penis','vagin',
  'porn','fuck','shit','cunt','nigger','negro','pédé','pede','tapette',

function pseudoHasBadWord(text) {
  const n = text.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]/g,'');
  return BAD_WORDS.some(w => n.includes(
    w.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]/g,'')
  ));
}

function validatePseudo(raw) {
  const p = raw.trim();
  if (p.length < 2)  return 'Minimum 2 caractères.';
  if (p.length > 20) return 'Maximum 20 caractères.';
  if (!/^[a-zA-Z0-9_\- ]+$/.test(p)) return 'Lettres, chiffres, _ - et espace uniquement.';
  if (pseudoHasBadWord(p)) return 'Ce pseudo n\'est pas autorisé.';
  return null;
}

const STORAGE_KEY       = 'sudogeo_best';

function loadBests() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function loadStats() {
  try {
    const raw = JSON.parse(localStorage.getItem(STATS_KEY) || 'null');
    if (!raw) return {};
    // Migration ancien format {started, completed} → nouveau
    if (typeof raw.started === 'number')
      return { _total: { started: raw.started, completed: raw.completed } };
    return raw;
  } catch { return {}; }
}

function incStat(key, diff) {
  const s = loadStats();
  if (!s._total) s._total = { started: 0, completed: 0 };
  s._total[key] = (s._total[key] || 0) + 1;
  if (diff) {
    if (!s[diff]) s[diff] = { started: 0, completed: 0 };
    s[diff][key] = (s[diff][key] || 0) + 1;
  }
  localStorage.setItem(STATS_KEY, JSON.stringify(s));
}

function renderStats() {
  const el = document.getElementById('game-stats');
  if (!el) return;
  const s = loadStats();
  const tot = s._total || {};
  if (!tot.started) { el.innerHTML = ''; return; }
  el.innerHTML = `🎮 Total : <span>${tot.started}</span> partie${tot.started > 1 ? 's' : ''}` +
    (tot.completed ? ` · <span>${tot.completed}</span> complétée${tot.completed > 1 ? 's' : ''}` : '');
}

function saveBest(diff, score) {
  if (score <= 0) return false; // score négatif ou nul : pas de record
  const bests = loadBests();
  const prev  = bests[diff];
  if (!prev || score > prev.score) {
    bests[diff] = { score, date: new Date().toLocaleDateString('fr-FR') };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bests));
    return true; // nouveau record
  }
  return false;
}

const DIFF_LABELS = { facile:'Facile', moyen:'Moyen', difficile:'Difficile',
                      avance:'Expert', expert2:'Globe-Trotter', diabolique:'Diabolique' };
let _lbDiff = 'moyen';

function openLeaderboard() {
  document.getElementById('lb-overlay').classList.add('show');
  renderLbTabs();
  loadLbContent(_lbDiff);
}
function closeLb() { document.getElementById('lb-overlay').classList.remove('show'); }

function renderLbTabs() {
  const el = document.getElementById('lb-tabs');
  const tabs = [...Object.entries(DIFF_LABELS), ['global', '🌍 Global']];
  el.innerHTML = tabs.map(([k,v]) =>
    `<button class="lb-tab${k===_lbDiff?' active':''}" onclick="loadLbContent('${k}')">${v}</button>`
  ).join('');
}

async function loadLbContent(diff) {
  _lbDiff = diff;
  renderLbTabs();
  const el = document.getElementById('lb-content');
  el.innerHTML = '<p class="lb-empty">Chargement…</p>';

  const isGlobal = diff === 'global';
  const rows = isGlobal ? await sbGetTop5Global() : await sbGetTop5(diff);
  if (!rows.length) {
    const emptyHint = isGlobal ? '' :
      `<p style="color:#465771;font-size:0.7em;text-align:center;padding:6px 4px 2px">
         Score max théorique : <strong style="color:#64748b">~${maxScoreEstimate(diff)} pts</strong>
         <span style="opacity:0.6">(parfait · pays rares · sans erreur)</span>
       </p>`;
    el.innerHTML = '<p class="lb-empty">Aucun score enregistré</p>' + emptyHint;
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const diffCol  = isGlobal ? `<th>Mode</th>` : '';
  const diffCell = isGlobal
    ? r => `<td style="color:#8496b0;font-size:0.82em">${DIFF_LABELS[r.difficulty]||r.difficulty}</td>` : () => '';

  const maxHint = isGlobal ? '' :
    `<p style="color:#465771;font-size:0.7em;text-align:center;padding:6px 4px 2px">
       Score max théorique : <strong style="color:#64748b">~${maxScoreEstimate(diff)} pts</strong>
       <span style="opacity:0.6">(parfait · pays rares · sans erreur)</span>
     </p>`;

  // Stocker les grid_data dans _lbGrids (évite l'échappement HTML dans les attributs)
  _lbGrids = {};
  rows.forEach((r, i) => { if (r.grid_data) _lbGrids[`${diff}-${i}`] = r.grid_data; });

  el.innerHTML = `<table class="lb-table">
    <thead><tr><th>#</th><th>Pseudo</th>${diffCol}<th>Score</th><th>Date</th><th></th></tr></thead>
    <tbody>${rows.map((r,i) => {
      const gid = r.grid_data ? `${diff}-${i}` : null;
      return `<tr>
        <td class="${i<3?'lb-rank-'+(i+1):''}">${medals[i]||i+1}</td>
        <td>${escHtml(r.pseudo)}</td>
        ${diffCell(r)}
        <td><strong>${r.score} pts</strong></td>
        <td style="color:#475569;font-size:0.85em">${new Date(r.created_at).toLocaleDateString('fr-FR')}</td>
        <td>${gid ? `<button class="lb-preview-btn" onclick="showGridPreview(event,'${gid}')">🔍</button>` : ''}</td>
      </tr>`;
    }).join('')}</tbody></table>${maxHint}`;
}

// ── Formulaire pseudo dans la fenêtre de victoire ────────────
let _pendingScore = 0, _pendingDiff = '', _pendingGridData = null;

function showPseudoForm(score, diff, inGlobal = false) {
  _pendingScore = score; _pendingDiff = diff;
  _pendingGridData = puzzleToGridData(puzzle);
  const label = DIFF_LABELS[diff] || diff;
  const vs = document.getElementById('victory-score');
  if (vs.querySelector('.pseudo-section')) return;
  const msg = inGlobal
    ? `🌍 Top 5 <strong>${label}</strong> et Top 5 <strong>mondial toutes catégories</strong> !`
    : `🏆 Top 5 en mode <strong>${label}</strong> !`;
  vs.insertAdjacentHTML('beforeend', `
    <div class="pseudo-section">
      <p>${msg}</p>
      <input id="pseudo-inp" type="text" maxlength="20" placeholder="Votre pseudo (2–20 car.)…"
             oninput="document.getElementById('pseudo-err').textContent=''">
      <div class="pseudo-error" id="pseudo-err"></div>
      <button class="btn-pseudo" onclick="submitPseudo()">Soumettre</button>
      <button class="btn-pseudo-skip" onclick="this.closest('.pseudo-section').remove()">Passer</button>
    </div>`);
}

async function submitPseudo() {
  const inp = document.getElementById('pseudo-inp');
  const err = document.getElementById('pseudo-err');
  const msg = validatePseudo(inp.value);
  if (msg) { err.textContent = msg; return; }
  const btn = document.querySelector('.btn-pseudo');
  btn.disabled = true; btn.textContent = '…';
  try {
    await sbSubmitScore(_pendingDiff, inp.value.trim(), _pendingScore, _pendingGridData);
    document.querySelector('.pseudo-section').innerHTML =
      `<p style="color:#4ade80">✓ Score soumis ! Merci ${escHtml(inp.value.trim())} 🎉</p>`;
  } catch {
    err.textContent = 'Erreur lors de la soumission. Réessaie.';
    btn.disabled = false; btn.textContent = 'Soumettre';
  }
}

// ── Partage de grille ────────────────────────────────────────
async function generateShareCanvas() {
  await document.fonts.ready;

  const cellCountries = Array.from({length: 9}, (_, idx) => {
    if (states[idx] !== 'valid') return null;
    const inp = getInput(idx);
    return inp ? (COUNTRY_INDEX.get(normInput(inp.value)) || null) : null;
  });

  const flagImgs = await Promise.all(cellCountries.map(c => {
    if (!c) return Promise.resolve(null);
    return new Promise(res => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => res(img);
      img.onerror = () => res(null);
      img.src = `https://flagcdn.com/w80/${c.code.toLowerCase()}.png`;
    });
  }));

  const sc = computeScore();

  const PAD    = 22;
  const CW     = 600;
  const LW     = 116;                        // largeur colonne étiquettes
  const CELLW  = (CW - 2 * PAD - LW) / 3;   // ~147
  const COLH   = 60;                          // hauteur ligne en-têtes colonnes
  const ROWH   = 94;                          // hauteur ligne données
  const GRIDH  = COLH + 3 * ROWH;            // 342
  const GRIDY  = 94;

  const DIFF_NAMES = { facile:'Facile', moyen:'Moyen', difficile:'Difficile', avance:'Expert', expert2:'Globe-Trotter', diabolique:'Diabolique' };
  const scoreRows = [];
  if (sc.rowBonus)           scoreRows.push({ label:'Bonus lignes complètes',               val:`+${sc.rowBonus} pts`,           pos:true });
  if (sc.colBonus)           scoreRows.push({ label:'Bonus colonnes complètes',              val:`+${sc.colBonus} pts`,           pos:true });
  if (sc.gridBonus)          scoreRows.push({ label:'🏆 Bonus grille entière',               val:`+${sc.gridBonus} pts`,          pos:true });
  if (sc.totalHintPenalty)   scoreRows.push({ label:'Indices utilisés',                      val:`−${sc.totalHintPenalty} pts`,   pos:false });
  if (sc.totalWrongPenalty)  scoreRows.push({ label:'Réponses invalides',                    val:`−${sc.totalWrongPenalty} pts`,  pos:false });
  if (sc.botCells)           scoreRows.push({ label:`${sc.botCells} case(s) résolue(s) par solver`, val:'0 pt',             pos:false });

  const ROW_LINE_H = 22;
  const SCOREH = 52 + Math.max(1, scoreRows.length) * ROW_LINE_H + 4;
  const CH = GRIDY + GRIDH + 20 + SCOREH + 30;

  const canvas = document.createElement('canvas');
  canvas.width = CW; canvas.height = CH;
  const ctx = canvas.getContext('2d');

  // Fond
  ctx.fillStyle = '#07111e';
  ctx.fillRect(0, 0, CW, CH);
  const glow = ctx.createRadialGradient(CW/2, -10, 0, CW/2, -10, 300);
  glow.addColorStop(0, 'rgba(59,130,246,0.14)');
  glow.addColorStop(1, 'rgba(59,130,246,0)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, CW, 300);

  // Helpers
  const box = (x, y, w, h, r, fill, stroke, lw=1) => {
    ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
    if (fill)   { ctx.fillStyle = fill;     ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
  };
  const wrapText = (text, maxW, font) => {
    ctx.font = font;
    const words = text.split(' ');
    const lines = []; let line = '';
    for (const w of words) {
      const t = line ? line + ' ' + w : w;
      if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = w; }
      else line = t;
    }
    if (line) lines.push(line);
    return lines;
  };
  const drawLines = (lines, font, color, cx, y, lh) => {
    ctx.font = font; ctx.fillStyle = color;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    lines.forEach((l, i) => ctx.fillText(l, cx, y + i * lh));
  };

  // En-tête
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = 'bold 26px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#93c5fd';
  ctx.fillText('🌍  Sudogeo  🌎', CW/2, 18);
  ctx.font = '13px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#8496b0';
  const dateStr = new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'long', year:'numeric'});
  ctx.fillText(`Mode ${DIFF_NAMES[difficulty] || difficulty}  ·  ${dateStr}`, CW/2, 52);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, 80); ctx.lineTo(CW-PAD, 80); ctx.stroke();

  // Grille
  const gx = PAD, gy = GRIDY;
  box(gx, gy, LW-3, COLH-3, 6, 'rgba(255,255,255,0.03)', 'rgba(255,255,255,0.08)');

  if (puzzle) {
    for (let c = 0; c < 3; c++) {
      const x = gx+LW+c*CELLW+3, w = CELLW-3, h = COLH-3;
      box(x, gy, w, h, 6, 'rgba(20,184,166,0.13)', 'rgba(20,184,166,0.32)');
      const ls = wrapText(puzzle.colRules[c].label, w-12, '11px Inter, system-ui, sans-serif');
      drawLines(ls, '11px Inter, system-ui, sans-serif', '#5eead4', x+w/2, gy+(h-ls.length*13)/2, 13);
    }
    for (let r = 0; r < 3; r++) {
      const rowY = gy + COLH + r * ROWH;
      const rw = LW-3, rh = ROWH-3;
      box(gx, rowY+3, rw, rh, 6, 'rgba(59,130,246,0.10)', 'rgba(59,130,246,0.26)');
      const rl = wrapText(puzzle.rowRules[r].label, rw-12, '11px Inter, system-ui, sans-serif');
      drawLines(rl, '11px Inter, system-ui, sans-serif', '#93c5fd', gx+rw/2, rowY+3+(rh-rl.length*13)/2, 13);

      for (let c = 0; c < 3; c++) {
        const idx = r*3+c;
        const cx = gx+LW+c*CELLW+3, cy = rowY+3;
        const cw = CELLW-3, ch = ROWH-3;
        box(cx, cy, cw, ch, 6, 'rgba(34,197,94,0.08)', 'rgba(34,197,94,0.48)');

        const fimg = flagImgs[idx];
        if (fimg) {
          const fw=58, fh=40, fx=cx+(cw-fw)/2, fy=cy+8;
          ctx.save();
          ctx.beginPath(); ctx.roundRect(fx, fy, fw, fh, 3); ctx.clip();
          ctx.drawImage(fimg, fx, fy, fw, fh);
          ctx.restore();
        }

        const country = cellCountries[idx];
        if (country) {
          const nom = country.nom.length > 15 ? country.nom.slice(0,14)+'…' : country.nom;
          ctx.textAlign = 'center'; ctx.textBaseline = 'top';
          ctx.font = '10px Inter, system-ui, sans-serif';
          ctx.fillStyle = '#c8d5e8';
          ctx.fillText(nom, cx+cw/2, cy+ch-17);
          const stars = rarityStars(country).trim();
          if (stars) {
            ctx.font = '9px Inter, system-ui, sans-serif';
            ctx.fillStyle = '#fde68a';
            ctx.fillText(stars, cx+cw/2, cy+ch-7);
          }
        }
        if (solvedByBot[idx]) {
          ctx.font = 'bold 8px Inter, system-ui, sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.28)';
          ctx.textAlign = 'center'; ctx.textBaseline = 'top';
          ctx.fillText('BOT', cx+cw/2, cy+3);
        }
      }
    }
  }

  // Section score
  const sy0 = gy + GRIDH + 26;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, sy0-8); ctx.lineTo(CW-PAD, sy0-8); ctx.stroke();

  ctx.font = 'bold 30px Inter, system-ui, sans-serif';
  ctx.fillStyle = sc.total > 0 ? '#fbbf24' : '#fca5a5';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(`${sc.total > 0 ? '🏆' : '😬'}  ${sc.total} pts`, CW/2, sy0);

  let sy = sy0 + 46;
  if (scoreRows.length === 0) {
    ctx.font = '12px Inter, system-ui, sans-serif';
    ctx.fillStyle = '#86efac';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('Score parfait — aucune pénalité', CW/2, sy);
  } else {
    for (const row of scoreRows) {
      ctx.font = '12px Inter, system-ui, sans-serif';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#8496b0';
      ctx.textAlign = 'left';
      ctx.fillText(row.label, PAD+12, sy);
      ctx.fillStyle = row.pos ? '#86efac' : '#fca5a5';
      ctx.textAlign = 'right';
      ctx.fillText(row.val, CW-PAD-12, sy);
      sy += ROW_LINE_H;
    }
  }

  // Pied de page
  ctx.font = '10px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#2d3f55';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('Sudogeo', CW/2, CH-16);

  return canvas;
}

async function doShareGrid() {
  const btn = document.getElementById('btn-share-grid');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Génération…'; }
  try {
    const canvas = await generateShareCanvas();
    await new Promise((resolve, reject) => {
      canvas.toBlob(async blob => {
        try {
          const file = new File([blob], 'sudogeo.png', {type: 'image/png'});
          if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
            const sc = computeScore();
            await navigator.share({
              title: 'Sudogeo',
              text: `J'ai complété une grille Sudogeo en mode ${DIFF_LABELS[difficulty] || difficulty} ! Score : ${sc.total} pts`,
              files: [file],
            });
          } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'sudogeo.png';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          }
          resolve();
        } catch(e) { reject(e); }
      }, 'image/png');
    });
  } catch(e) {
    if (e?.name !== 'AbortError') console.warn('Share error:', e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📤 Partager la grille'; }
  }
}
